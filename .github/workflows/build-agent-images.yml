name: Build Agent Images

# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, E2B_API_KEY

on:
  workflow_dispatch:
    inputs:
      build_docker:
        description: "Build & push Docker Hub agent images"
        type: boolean
        default: true
      build_e2b:
        description: "Rebuild E2B templates"
        type: boolean
        default: true
      include_t3:
        description: "Also build T3Code Docker image"
        type: boolean
        default: true
      opencode_version:
        description: "OpenCode version pin (latest or semver)"
        type: string
        default: "latest"
      t3_version:
        description: "T3 version pin (latest or semver)"
        type: string
        default: "latest"

env:
  DOCKERHUB_NAMESPACE: opeoginni

jobs:
  build-docker:
    if: ${{ inputs.build_docker }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: opencode
            file: .docker/Opencode.Dockerfile
            context: .docker
            image: gitterm-opencode
            tag: latest
            agent: opencode
          - id: opencode-server
            file: .docker/Opencode.Server.Dockerfile
            context: .docker
            image: gitterm-opencode-server
            tag: latest
            agent: opencode
          - id: opencode-aws-server
            file: .docker/Opencode.Server.AWS.Dockerfile
            context: .docker
            image: gitterm-opencode-aws-server
            tag: latest
            agent: opencode
          - id: t3code-server
            file: .docker/T3Code.Server.Dockerfile
            context: .docker
            image: gitterm-t3code-server
            tag: latest
            agent: t3
          - id: cf-sandbox
            file: packages/api/src/providers/cloudflare/sandbox-worker/Dockerfile
            context: packages/api/src/providers/cloudflare/sandbox-worker
            image: gitterm-cf-sandbox
            tag: "0.12.1"
            agent: cf

    steps:
      - name: Skip T3 when disabled
        if: ${{ matrix.agent == 't3' && !inputs.include_t3 }}
        run: |
          echo "Skipping T3 image (include_t3=false)"
          echo "skip=true" >> "$GITHUB_ENV"

      - name: Checkout
        if: ${{ env.skip != 'true' }}
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: ${{ env.skip != 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.skip != 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: ${{ env.skip != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          pull: true
          no-cache: true
          tags: ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ matrix.tag }}
          build-args: |
            OPENCODE_VERSION=${{ inputs.opencode_version }}
            OPENCODE_INSTALL_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}
            T3_VERSION=${{ inputs.t3_version }}
            T3_INSTALL_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}

  build-e2b:
    if: ${{ always() && inputs.build_e2b && (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build E2B templates
        working-directory: packages/api
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: bun run e2b:build
