name: Bug report
description: Something isn't working as expected
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of GitTerm is affected?
      options:
        - Web app (dashboard)
        - Workspaces / terminal
        - CLI (gitterm)
        - API / server
        - Self-hosting / local development
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser/OS, CLI version, or self-hosted setup details — whatever applies.
      placeholder: |
        - OS: macOS 15
        - Browser: Chrome 130
        - gitterm CLI: 0.0.3

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant console output, server logs, or screenshots.
      render: shell
