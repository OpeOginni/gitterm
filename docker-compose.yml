name: gitterm

services:
  postgres:
    image: postgres
    container_name: gitterm-postgres
    environment:
      POSTGRES_DB: gitterm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - gitterm_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: gitterm-redis
    ports:
      - "6379:6379"
    volumes:
      - gitterm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  gitterm_postgres_data:
  gitterm_redis_data:
